<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/style/modal.css" />

		<title>Modal Popup Examples</title>
	</head>
	<body>
		<a href="#cookie-window" class="btn">Open Modal</a>
		<!-- Cookie Policy Pop-up Window -->
		<div id="cookie-window" class="modal">
			<div class="modal-content">
				<h1>We use cookies!</h1>
				<p>
					Learn how this website use cookies to track you. Do you consent to our cookie
					policy?
				</p>
				<a href="#" class="modal-close"> Close </a>
			</div>
		</div>
	</body>
	<style></style>
</html>
